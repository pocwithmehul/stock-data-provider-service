{{- if .Values.mongo.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongo.name }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.mongo.name }}
  ports:
    - name: mongo
      port: {{ .Values.mongo.port }}
      targetPort: mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mongo.name }}
spec:
  strategy:
    type: Recreate
    rollingUpdate: null
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.mongo.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.mongo.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.mongo.image.pullPolicy }}
          ports:
            - name: mongo
              containerPort: {{ .Values.mongo.port }}
          livenessProbe:
            tcpSocket:
              port: mongo
          readinessProbe:
            tcpSocket:
              port: mongo
          resources:
            {{- toYaml .Values.mongo.resources | nindent 12 }}
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
{{- if .Values.mongo.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.mongo.name }}
{{- else }}
          emptyDir: {}
{{- end }}
{{- if .Values.mongo.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.mongo.name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.mongo.storage.size }}
{{- end }}
{{- end }}
