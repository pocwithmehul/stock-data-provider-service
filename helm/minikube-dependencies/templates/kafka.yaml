{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafka.name }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.kafka.name }}
  ports:
    - name: kafka
      port: {{ .Values.kafka.port }}
      targetPort: kafka
    - name: controller
      port: {{ .Values.kafka.controllerPort }}
      targetPort: controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.kafka.name }}
spec:
  strategy:
    type: Recreate
    rollingUpdate: null
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.kafka.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.kafka.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:{{ .Values.kafka.port }},CONTROLLER://:{{ .Values.kafka.controllerPort }}
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://{{ .Values.kafka.name }}:{{ .Values.kafka.port }}
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:{{ .Values.kafka.controllerPort }}
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | quote }}
          ports:
            - name: kafka
              containerPort: {{ .Values.kafka.port }}
            - name: controller
              containerPort: {{ .Values.kafka.controllerPort }}
          startupProbe:
            tcpSocket:
              port: kafka
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 20
          readinessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-data
{{- if .Values.kafka.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.kafka.name }}
{{- else }}
          emptyDir: {}
{{- end }}
{{- if .Values.kafka.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.kafka.name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.kafka.storage.size }}
{{- end }}
{{- end }}
