server:
  port: 8082
kafka:
  brokers:
    - kafka:9092
  topic: stock-ticker-event
  groupId: stock-data-provider-group
mongo:
  uri: mongodb://mongo:27017
  database: stockdata
  collection: stockevents
datadog:
  apiKey: ""
  site: datadoghq.com
  env: development
tokenAuthorization:
  validIssuers:
    - login.myorg.com
  validAudience:
    - myorgstockapp
